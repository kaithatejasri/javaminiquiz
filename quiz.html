<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App Fixed</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#eef5ff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:90%;
max-width:900px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#e8f1ff;
border-radius:8px;
}

.question{
margin-top:20px;
font-size:20px;
font-weight:600;
}

.option{
margin-top:10px;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
cursor:pointer;
}

.option:hover{background:#f0f7ff;}
.selected{border:2px solid blue;background:#e6f0ff;}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

#next{background:#2563eb;color:white;}
#prev{background:#ccc;}
#finish{background:green;color:white;display:none;}

.msg{color:red;margin-top:10px;}

#resultPage,#reviewPage{display:none;}
</style>
</head>

<body>

<!-- QUIZ -->
<div class="card" id="quizPage">

<div class="header">
<div id="user">User</div>
<div id="progress"></div>
<div id="timer"></div>
</div>

<div class="question" id="question"></div>
<div id="options"></div>

<div class="msg" id="msg"></div>

<div class="buttons">
<button id="prev" onclick="prev()">Previous</button>
<button id="next" onclick="next()">Next</button>
<button id="finish" onclick="finish()">Finish</button>
</div>

</div>

<!-- RESULT -->
<div class="card" id="resultPage"></div>

<!-- REVIEW -->
<div class="card" id="reviewPage"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5Cz_CL_YBG7VVMBtbsdMBRY6erEezjEE",
  authDomain: "javaminiquiz.firebaseapp.com",
  projectId: "javaminiquiz",
  storageBucket: "javaminiquiz.firebasestorage.app",
  messagingSenderId: "493620092943",
  appId: "1:493620092943:web:e2f300b30985eb9b8cc37a",
  measurementId: "G-ZEPKRKN3CN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;
window.addDoc = addDoc;
window.collection = collection;
window.getDocs = getDocs;
</script>


<script>

/* USER */
let user = localStorage.getItem("currentUser") || "Guest";
document.getElementById("user").innerText = "User: " + user;

/* TIMER */
let startTime;
let timerInterval;

/* QUESTIONS PLACEHOLDER (PUT YOUR 50 QUESTIONS HERE) */
const questions = [

o:["Initializes object","Deletes object","Runs loop","Creates file"],

o:["try-catch","if-else","loop","switch"],

o:["throw","throws","catch","final"],

o:["throws","throw","catch","final"],

o:["Throwable","Object","System","Runtime"],

o:["Integer.parseInt()","toString()","valueOfChar()","parseString()"],

o:["do-while","for","while","foreach"],

o:["this","super","self","object"],

o:["Bytecode","Source","Binary","Exe"],
a:0
},

{
q:"Which class is root of Java?",
o:["Object","Main","System","Class"],

},

{
q:"Which sorting is O(n log n)?",
o:["Merge sort","Bubble sort","Selection sort","Linear sort"],
a:0

];

let i = 0;
let ans = new Array(questions.length).fill(null);

/* START QUIZ */
function startQuiz(){
clearInterval(timerInterval);

i=0;
ans = new Array(questions.length).fill(null);
startTime = Date.now();

timerInterval = setInterval(()=>{

let t = Date.now() - startTime;

let mins = String(Math.floor(t/60000)).padStart(2,"0");
let secs = String(Math.floor((t%60000)/1000)).padStart(2,"0");
let ms   = String(t%1000).padStart(3,"0");

document.getElementById("timer").innerText =
`${mins}:${secs}:${ms}`;

},10);

show();
}

/* SHOW QUESTION */
function show(){

document.getElementById("msg").innerText="";
document.getElementById("progress").innerText=(i+1)+"/"+questions.length;

let q = questions[i];
document.getElementById("question").innerText = q.q;

let box = document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,idx)=>{
let div=document.createElement("div");
div.className="option";
if(ans[i]===idx) div.classList.add("selected");

div.innerText=opt;

div.onclick=()=>{
ans[i]=idx;
show();
};

box.appendChild(div);
});

document.getElementById("finish").style.display =
(i===questions.length-1)?"block":"none";

document.getElementById("next").style.display =
(i===questions.length-1)?"none":"block";
}

/* NEXT */
function next(){
if(ans[i]===null){
document.getElementById("msg").innerText="Select an option";
return;
}
if(i<questions.length-1)i++;
show();
}

/* PREV */
function prev(){
if(i>0)i--;
show();
}

/* FINISH */

async function finish(){

if(ans[i]===null){
document.getElementById("msg").innerText="Select an option";
return;
}



clearInterval(timerInterval);

let score=0;
questions.forEach((q,idx)=>{
if(ans[idx]===q.a) score++;
});

let timeTaken = Date.now()-startTime;
let now = new Date();

let dateTaken =
now.getDate()+"/"+
(now.getMonth()+1)+"/"+
String(now.getFullYear()).slice(-2)+" "+
now.toLocaleTimeString([],{
hour:'numeric',
minute:'2-digit'
});
let leaderboard =
JSON.parse(localStorage.getItem("leaderboard")) || [];

let normalizedUser = user.trim().toLowerCase();

let existingIndex = leaderboard.findIndex(
p => p.name.trim().toLowerCase() === normalizedUser
);

if(existingIndex !== -1){

    leaderboard[existingIndex].score = score;

    leaderboard[existingIndex].time = timeTaken;

    leaderboard[existingIndex].date = dateTaken;

    leaderboard[existingIndex].attempts =
    (leaderboard[existingIndex].attempts || 0) + 1;

}else{

    leaderboard.push({
        name:user,
        score:score,
        time:timeTaken,
        date:dateTaken,
        attempts:1
    });

}

await addDoc(
collection(db, "leaderboard"),
{
  name: user,
  score: score,
  time: timeTaken,
  attempts: 1,
  date: dateTaken
}
);
document.getElementById("quizPage").style.display="none";

document.getElementById("resultPage").style.display="block";

document.getElementById("resultPage").innerHTML = `
<h2>Quiz Completed 🎉</h2>

<p><b>Score:</b> ${score}/${questions.length}</p>

<p><b>Time:</b>
${Math.floor(timeTaken/60000)}m
${Math.floor((timeTaken%60000)/1000)}s
${String(timeTaken%1000).padStart(3,"0")}ms
</p>

<button onclick="showReview()">View Answers</button>
<button onclick="window.location.href='leaderboard.html'">
Leaderboard
</button>

<button onclick="window.location.reload()">
Retake Quiz
</button>
`;
}



/* REVIEW */
function showReview(){

document.getElementById("resultPage").style.display="none";
document.getElementById("reviewPage").style.display="block";

let html="<h2>Review Answers</h2>";

questions.forEach((q,idx)=>{

html+=`
<div style="margin:10px;padding:10px;border:1px solid #ccc">
<b>Q${idx+1}: ${q.q}</b><br>
Your: ${ans[idx]!=null?q.o[ans[idx]]:"Not answered"}<br>
Correct: ${q.o[q.a]}<br>
${ans[idx]===q.a?"✔ Correct":"❌ Wrong"}
</div>
`;
});
html += `
<button onclick="window.location.reload()">
Retake Quiz
</button>
<button onclick="window.location.href='leaderboard.html'">
Leaderboard
</button>
`;

document.getElementById("reviewPage").innerHTML = html;

}

function showLeaderboard(){
alert(localStorage.getItem("leaderboard"));
document.getElementById("leaderboardPage").style.display="block";
document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="none";
document.getElementById("reviewPage").style.display="none";

let board =
JSON.parse(localStorage.getItem("leaderboard")) || [];

// Remove duplicate usernames
let uniqueBoard = [];

board.forEach(player => {

    let existing = uniqueBoard.find(
        p => p.name.trim().toLowerCase() ===
        player.name.trim().toLowerCase()
    );

    if(!existing){
        uniqueBoard.push(player);
    }else{

        existing.score = player.score;
        existing.time = player.time;
        existing.date = player.date;
        existing.attempts = player.attempts;

    }
});

board = uniqueBoard;
board.sort((a,b)=>{

    if(b.score !== a.score)
        return b.score - a.score;

    return a.time - b.time;

});


let html =
"<h2 style='text-align:center'>🏆 Java Quiz Leaderboard</h2>";

board.forEach((p,index)=>{

let medal="";

if(index===0) medal="🥇";
else if(index===1) medal="🥈";
else if(index===2) medal="🥉";

html += `
<div style="
padding:15px;
margin:12px 0;
border-radius:12px;
background:#f5f9ff;
border:1px solid #ddd;
font-size:18px;
">

${medal} ${index+1}. ${p.name}
&nbsp;&nbsp; ${p.score}/${questions.length}
&nbsp;&nbsp; ${p.attempts || 1} Attempts
&nbsp;&nbsp; ${Math.floor(p.time/60000)}m
${Math.floor((p.time%60000)/1000)}s
${p.time%1000}ms
&nbsp;&nbsp;${p.date || "-"}

</div>
`;

});

html += `
<br><br>
<button onclick="window.location.reload()">
Retake Quiz
</button>
`;

document.getElementById("leaderboardPage").innerHTML = html;

}



/* RETAKE */
function retake(){

clearInterval(timerInterval);

i = 0;
ans = new Array(questions.length).fill(null);
document.getElementById("timer").innerText = "00:00:000";
document.getElementById("quizPage").style.display="block";
document.getElementById("resultPage").style.display="none";
document.getElementById("reviewPage").style.display="none";
document.getElementById("leaderboardPage").style.display="none";

startQuiz();
}
/* INIT */
startQuiz();

</script>

</body>
</html>
