<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App Fixed</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#eef5ff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
width:90%;
max-width:900px;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#e8f1ff;
border-radius:8px;
}

.question{
margin-top:20px;
font-size:20px;
font-weight:600;
}

.option{
margin-top:10px;
padding:12px;
border:1px solid #ccc;
border-radius:8px;
cursor:pointer;
}

.option:hover{background:#f0f7ff;}
.selected{border:2px solid blue;background:#e6f0ff;}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

#next{background:#2563eb;color:white;}
#prev{background:#ccc;}
#finish{background:green;color:white;display:none;}

.msg{color:red;margin-top:10px;}

#resultPage,#reviewPage{display:none;}
</style>
</head>

<body>

<!-- QUIZ -->
<div class="card" id="quizPage">

<div class="header">
<div id="user">User</div>
<div id="progress"></div>
<div id="timer"></div>
</div>

<div class="question" id="question"></div>
<div id="options"></div>

<div class="msg" id="msg"></div>

<div class="buttons">
<button id="prev" onclick="prev()">Previous</button>
<button id="next" onclick="next()">Next</button>
<button id="finish" onclick="finish()">Finish</button>
</div>

</div>

<!-- RESULT -->
<div class="card" id="resultPage"></div>

<!-- REVIEW -->
<div class="card" id="reviewPage"></div>
<div class="card" id="leaderboardPage" style="display:none"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyA5Cz_CL_YBG7VVMBtbsdMBRY6erEezjEE",
  authDomain: "javaminiquiz.firebaseapp.com",
  projectId: "javaminiquiz",
  storageBucket: "javaminiquiz.firebasestorage.app",
  messagingSenderId: "493620092943",
  appId: "1:493620092943:web:e2f300b30985eb9b8cc37a",
  measurementId: "G-ZEPKRKN3CN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

window.getDocs = getDocs;
window.doc = doc;
window.setDoc = setDoc;
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* USER */
let user = localStorage.getItem("currentUser") || "Guest";
document.getElementById("user").innerText = "User: " + user;

/* TIMER */
let startTime;
let timerInterval;

/* QUESTIONS PLACEHOLDER (PUT YOUR 50 QUESTIONS HERE) */
const questions = [
{
q:"What is JVM responsible for?",
o:["Executing bytecode","Writing Java code","Compiling source code","Database management"],
a:0
},

{
q:"What is bytecode?",
o:["Machine code","Source code","OS file","Intermediate code generated by Java compiler"],
a:3
},

{

o:["JVM","Javac compiler","Garbage Collector","ClassLoader"],
a:1
},

{
q:"Java is which type of language?",
o:["Object oriented","Procedure oriented","Assembly","Machine level"],
a:0
},

{
q:"Which feature makes Java platform independent?",
o:["Pointers","Header files","Bytecode and JVM","Registers"],
a:2
},

{
q:"What is encapsulation?",
o:["Binding data and methods","Hiding OS","Deleting objects","Loop execution"],
a:0
},

{
q:"What is abstraction?",
o:["Showing full code","Deleting class","Compilation","Hiding implementation details"],
a:3
},

{
q:"What is inheritance?",
o:["Object creation","Child class acquires properties and methods from parent class","Looping","Compilation"],
a:1
},

{
q:"What is polymorphism?",
o:["Single method","Memory allocation","Same method many forms","File handling"],
a:2
},

{
q:"Which keyword is used for inheritance?",
o:["implements","this","extends","super"],
a:2
},

{
q:"Which keyword is used to create object?",
o:["new","class","void","create"],
a:0
},

{
q:"What is constructor?",
o:["Deletes object","Special method used to initialize object","Runs loop","Creates file"],
a:1
},

{
q:"Can constructor return value?",
o:["Yes","Only int","Only object","No"],

},

{
q:"Which method is entry point of Java?",
o:["main()","start()","run()","init()"],
a:0
},

{
q:"Which class is immutable?",
o:["StringBuilder","ArrayList","String","HashMap"],
a:2
},

{
q:"Which method compares strings?",
o:["==","compare()","match()","equals()"],
a:3
},

{
q:"Which package contains String class?",
o:["java.util","java.lang","java.io","java.net"],
a:1
},

{
q:"Which block handles exceptions?",
o:["if-else","try-catch","loop","switch"],
a:1
},

{
q:"Which keyword is used to throw exception?",
o:["throw","throws","catch","final"],
a:0
},

{
q:"Which keyword declares exception?",
o:["throw","catch","throws","final"],
a:2

{
q:"Which is checked exception?",
o:["NullPointerException","ArithmeticException","IndexOutOfBounds","IOException"],
a:3
},

{
q:"Superclass of all exceptions?",
o:["Object","System","Throwable","Runtime"],
a:2
},

{

o:["run()","start()","execute()","begin()"],

o:["Acts like normal method","Creates thread","Stops program","Error"],

o:[".class",".java",".exe",".bin"],

o:["static","protected","final","abstract"],

o:["final","const","static","define"],

o:["equals","=","==","!="],

o:["toString()","Integer.parseInt()","valueOfChar()","parseString()"],
a:1

o:["do-while","for","while","foreach"],
a:0

o:["Stack","Registers","Heap","Cache"],

o:["IOException","SQLException","NullPointerException","FileNotFound"],

o:["Vector","ArrayList","HashMap","TreeMap"],

},

{
q:"Which keyword refers parent?",
o:["this","super","base","parent"],
a:1
},

{
q:"Which keyword refers current object?",
o:["super","self","object","this"],
a:3
},

{
q:"Which interface is implemented by all collection classes except Map?",
o:["Iterable","Serializable","Comparable","Cloneable"],
a:0
},

{
q:"Which collection does not allow duplicate elements?",
o:["ArrayList","Map","Vector","HashSet"],
a:3
},

{
q:"Which sorting is O(n log n)?",
o:["Bubble sort","Selection sort","Merge sort","Linear sort"],
a:2
}
];

let i = 0;
let ans = new Array(questions.length).fill(null);

/* START QUIZ */
function startQuiz(){
clearInterval(timerInterval);

i = 0;
ans = new Array(questions.length).fill(null);

// Shuffle questions
questions.sort(() => Math.random() - 0.5);

startTime = Date.now();

timerInterval = setInterval(()=>{

let t = Date.now() - startTime;

let mins = String(Math.floor(t/60000)).padStart(2,"0");
let secs = String(Math.floor((t%60000)/1000)).padStart(2,"0");
let ms   = String(t%1000).padStart(3,"0");

document.getElementById("timer").innerText =
`${mins}:${secs}:${ms}`;

},10);

show();
}

/* SHOW QUESTION */
function show(){

document.getElementById("msg").innerText="";
document.getElementById("progress").innerText=(i+1)+"/"+questions.length;

let q = questions[i];
document.getElementById("question").innerText = q.q;

let box = document.getElementById("options");
box.innerHTML="";

q.o.forEach((opt,idx)=>{
let div=document.createElement("div");
div.className="option";
if(ans[i]===idx) div.classList.add("selected");

div.innerText=opt;

div.onclick=()=>{
ans[i]=idx;
show();
};

box.appendChild(div);
});

document.getElementById("finish").style.display =
(i===questions.length-1)?"block":"none";

document.getElementById("next").style.display =
(i===questions.length-1)?"none":"block";
// Disable Previous button on first question
document.getElementById("prev").disabled = (i === 0);
// Disable Next button on last question
document.getElementById("next").disabled = (i === questions.length - 1);
}

/* NEXT */
function next(){
if(ans[i]===null){
document.getElementById("msg").innerText="Select an option";
return;
}
if(i<questions.length-1)i++;
show();
}

/* PREV */
function prev(){
if(i>0)i--;
show();
}

/* FINISH */

async function finish(){
if(ans.includes(null)){
    alert("Please answer all questions before submitting.");
    return;
}

if(ans[i]===null){
document.getElementById("msg").innerText="Select an option";
return;
}



clearInterval(timerInterval);

let score=0;
questions.forEach((q,idx)=>{
if(ans[idx]===q.a) score++;
});
let percentage = ((score / questions.length) * 100).toFixed(2);
let passMarks = Math.ceil(questions.length * 0.5);

let status = score >= passMarks
? "PASS ✅"
: "FAIL ❌";
let timeTaken = Date.now()-startTime;
let now = new Date();

let dateTaken =
now.getDate()+"/"+
(now.getMonth()+1)+"/"+
String(now.getFullYear()).slice(-2)+" "+
now.toLocaleTimeString([],{
hour:'numeric',
minute:'2-digit'
});
let leaderboard =
JSON.parse(localStorage.getItem("leaderboard")) || [];

let normalizedUser = user.trim().toLowerCase();

let existingIndex = leaderboard.findIndex(
p => p.name.trim().toLowerCase() === normalizedUser
);

if(existingIndex !== -1){

    leaderboard[existingIndex].score = score;

    leaderboard[existingIndex].time = timeTaken;

    leaderboard[existingIndex].date = dateTaken;

    leaderboard[existingIndex].attempts =
    (leaderboard[existingIndex].attempts || 0) + 1;

}else{

    leaderboard.push({
        name:user,
        score:score,
        time:timeTaken,
        date:dateTaken,
        attempts:1
    });

}
await setDoc(
doc(db, "leaderboard", user.trim().toLowerCase()),
{
  name: user,
  score: score,
  time: timeTaken,
  attempts: existingIndex !== -1
      ? (leaderboard[existingIndex].attempts || 1)
      : 1,
  date: dateTaken
}
);
localStorage.setItem(
"leaderboard",
JSON.stringify(leaderboard)
);

document.getElementById("quizPage").style.display="none";

document.getElementById("resultPage").style.display="block";
document.getElementById("resultPage").innerHTML = `
<h2>Quiz Completed 🎉</h2>

<p><b>Score:</b> ${score}/${questions.length}</p>

<p><b>Percentage:</b> ${percentage}%</p>

<p><b>Result:</b> ${status}</p>

${status.includes("PASS")
? "<h3 style='color:green'>🎉 Congratulations! You passed the quiz.</h3>"
: "<h3 style='color:red'>😔 Better luck next time.</h3>"}

<p>
<b>Time:</b>
${Math.floor(timeTaken/60000)}m
${Math.floor((timeTaken%60000)/1000)}s
${String(timeTaken%1000).padStart(3,"0")}ms
</p>

${Number(percentage)>=80
?
`<button onclick="downloadCertificate(${score},${percentage})">
🎓 Download Certificate
</button>`
:
""}

<button onclick="showReview()">
View Answers
</button>

<button onclick="window.location.href='leaderboard.html'">
Leaderboard
</button>

<button onclick="if(confirm('Do you want to retake the quiz?')) window.location.reload();">
Retake Quiz
</button>
`;

}



/* REVIEW */
function showReview(){

document.getElementById("resultPage").style.display="none";
document.getElementById("reviewPage").style.display="block";

let html="<h2>Review Answers</h2>";

questions.forEach((q,idx)=>{

html+=`
<div style="margin:10px;padding:10px;border:1px solid #ccc">
<b>Q${idx+1}: ${q.q}</b><br>
Your:
<span style="color:${ans[idx]===q.a ? 'green' : 'red'};font-weight:bold;">
${ans[idx]!=null ? q.o[ans[idx]] : "Not answered"}
</span><br>
Correct:
<span style="color:green;font-weight:bold;">
${q.o[q.a]}
</span><br>
<span style="color:${ans[idx]===q.a?'green':'red'};font-weight:bold;">
${ans[idx]===q.a?"✔ Correct":"❌ Wrong"}
</span>
</div>
`;
});
html += `
<button onclick="if(confirm('Do you want to retake the quiz?')) window.location.reload();">
Retake Quiz
</button>
<button onclick="window.location.href='leaderboard.html'">
Leaderboard
</button>
`;

document.getElementById("reviewPage").innerHTML = html;

}

function showLeaderboard(){
document.getElementById("leaderboardPage").style.display="block";
document.getElementById("quizPage").style.display="none";
document.getElementById("resultPage").style.display="none";
document.getElementById("reviewPage").style.display="none";

let board =
JSON.parse(localStorage.getItem("leaderboard")) || [];

// Remove duplicate usernames
let uniqueBoard = [];

board.forEach(player => {

    let existing = uniqueBoard.find(
        p => p.name.trim().toLowerCase() ===
        player.name.trim().toLowerCase()
    );

    if(!existing){
        uniqueBoard.push(player);
    }else{

        existing.score = player.score;
        existing.time = player.time;
        existing.date = player.date;
        existing.attempts = player.attempts;

    }
});

board = uniqueBoard;
board.sort((a,b)=>{

    if(b.score !== a.score)
        return b.score - a.score;

    return a.time - b.time;

});


let html =
"<h2 style='text-align:center'>🏆 Java Quiz Leaderboard</h2>";

board.forEach((p,index)=>{

let medal="";

if(index===0) medal="🥇";
else if(index===1) medal="🥈";
else if(index===2) medal="🥉";

html += `
<div style="
padding:15px;
margin:12px 0;
border-radius:12px;
background:#f5f9ff;
border:1px solid #ddd;
font-size:18px;
">

${medal} ${index+1}. ${p.name}
&nbsp;&nbsp; ${p.score}/${questions.length}
&nbsp;&nbsp; ${p.attempts || 1} Attempts
&nbsp;&nbsp; ${Math.floor(p.time/60000)}m
${Math.floor((p.time%60000)/1000)}s
${p.time%1000}ms
&nbsp;&nbsp;${p.date || "-"}

</div>
`;

});

html += `
<br><br>
<button onclick="if(confirm('Do you want to retake the quiz?')) window.location.reload();">
Retake Quiz
</button>
`;

document.getElementById("leaderboardPage").innerHTML = html;

}



/* RETAKE */
function retake(){

clearInterval(timerInterval);

i = 0;
ans = new Array(questions.length).fill(null);
document.getElementById("timer").innerText = "00:00:000";
document.getElementById("quizPage").style.display="block";
document.getElementById("resultPage").style.display="none";
document.getElementById("reviewPage").style.display="none";
document.getElementById("leaderboardPage").style.display="none";

startQuiz();
}

   pdf.rect(92,120,112,36);

	await setDoc(

    pdf.setFont("helvetica","bold");

    pdf.setFontSize(11);

pdf.text(
"Verification URL:",
148,
182,
{align:"center"}
);

pdf.setFontSize(10);

pdf.text(
"https://kaithatejasri.github.io/javaminiquiz/verify.html?id="+certificateId,
148,
188,
{align:"center"}
);

    // Date
    pdf.setFont("helvetica","normal");
    pdf.setFontSize(12);
    pdf.text("Date : " + today,30,185);

    // Signature Line
    pdf.line(215,180,275,180);

    pdf.setFont("times","italic");
    pdf.setFontSize(12);

    pdf.text("Kaitha Teja Sri",245,188,{align:"center"});
    pdf.text("Project Developer",245,195,{align:"center"});

    // Footer
    pdf.setFont("helvetica","italic");
    pdf.setFontSize(11);
    pdf.setTextColor(120);

    pdf.text(
        "Java Quiz Application • Powered by Firebase",

        {align:"center"}
    );

    pdf.save(user.replace(/\s+/g,"_") + "_Certificate.pdf");

}
/* INIT */
startQuiz();

</script>
